document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ck; width: 22px; height: 1.5px; background: var(--slate-deep); transition: transform 0.3s, opacity 0.3s; }\n  .nav-hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(4.5px, 4.5px); }\n  .nav-hamburger.open span:nth-child(2) { opacity: 0; }\n  .nav-hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(4.5px, -4.5px); }\n  @media (max-width: 768px) {\n    nav { padding: 0 20px; height: 60px; }\n    .nav-hamburger { display: flex; }\n    .nav-cta { display: none; }\n    .nav-links { display: none; position: fixed; top: 60px; left: 0; right: 0; background: rgba(255,255,255,0.98); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); flex-direction: column; gap: 0; padding: 0; z-index: 99; }\n    .nav-links.open { display: flex; }\n    .nav-links li { width: 100%; }\n    .nav-links a { display: block; padding: 16px 24px; font-size: 14px; border-bottom: 1px solid var(--border); }\n    .hero { padding: 80px 24px 60px; flex-direction: column; justify-content: flex-start; align-items: flex-start; }\n    .hero-content { max-width: 100%; }\n    .hero h1 { font-size: clamp(32px, 8vw, 48px); }\n    section { padding: 56px 24px; }\n    #about { grid-template-columns: 1fr; gap: 40px; }\n    .sectors-header { flex-direction: column; align-items: flex-start; gap: 16px; margin-bottom: 40px; }\n    .sectors-header p { max-width: 100% !important; }\n    .sector-cards { grid-template-columns: 1fr; }\n    .sector-card { padding: 28px 24px; }\n    #team { text-align: left; }\n    .team-header { text-align: left; margin-bottom: 40px; }\n    .team-header .section-eyebrow { justify-content: flex-start; }\n    .team-header .section-sub { margin: 0; }\n    .team-grid { grid-template-columns: 1fr; max-width: 100%; }\n    .team-card { padding: 28px 20px; }\n    #contact { grid-template-columns: 1fr; gap: 40px; }\n    .form-row { grid-template-columns: 1fr; }\n    .contact-detail:first-of-type { margin-top: 24px; }\n    footer { flex-direction: column; gap: 10px; padding: 32px 24px; text-align: center; }\n  }\n  @media (max-width: 480px) {\n    .hero { padding: 72px 20px 48px; }\n    section { padding: 48px 20px; }\n    nav { padding: 0 16px; }\n    footer { padding: 28px 20px; }\n    .sector-card { padding: 24px 20px; }\n    .team-card { padding: 24px 20px; }\n    .pillar { gap: 16px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<nav>\n  <a href=\"#hero\" class=\"nav-logo\" style=\"display: flex; align-items: center; gap: 12px;\">\n    <svg width=\"32\" height=\"26\" viewBox=\"0 0 80 64\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n      <path d=\"M 4 48 L 16 24 L 28 38 L 40 18 L 52 36 L 60 26 L 76 48\" stroke=\"#5B8FA8\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"stroke-width: 5px\"><\u002Fpath>\n    <\u002Fsvg>\n    <div style=\"display: flex; flex-direction: column; gap: 0; line-height: 1;\">\n      <span style=\"font-size: 20px; font-weight: 600; color: #111E2B;\">Arista<\u002Fspan>\n      <span style=\"font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: rgb(107, 126, 144); font-family: &quot;DM Sans&quot;\">Partners<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fa>\n  <button class=\"nav-hamburger\" aria-label=\"Toggle menu\" aria-expanded=\"false\">\n    <span><\u002Fspan><span><\u002Fspan><span><\u002Fspan>\n  <\u002Fbutton>\n  <ul class=\"nav-links\">\n    <li><a href=\"#about\" data-en=\"About\" data-es=\"Nosotros\">About<\u002Fa><\u002Fli>\n    <li><a href=\"#sectors\" data-en=\"Sectors\" data-es=\"Sectores\">Sectors<\u002Fa><\u002Fli>\n    <li><a href=\"#investors\" data-en=\"Investors\" data-es=\"Inversores\">Investors<\u002Fa><\u002Fli>\n    <li><a href=\"#team\" data-en=\"Team\" data-es=\"Equipo\">Team<\u002Fa><\u002Fli>\n  <\u002Ful>\n  <div style=\"display:flex;align-items:center;gap:12px;\">\n    <button id=\"lang-toggle\" aria-label=\"Toggle language\" style=\"font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;background:transparent;border:1px solid var(--border);color:var(--text-mid);padding:6px 14px;cursor:pointer;transition:all 0.2s;white-space:nowrap;\">ES<\u002Fbutton>\n    <a href=\"#contact\" class=\"nav-cta\" data-en=\"Get in Touch\" data-es=\"Contáctanos\">Get in Touch<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<section class=\"hero\" id=\"hero\">\n  <div class=\"hero-bg-lines\"><canvas id=\"hero-canvas\"><\u002Fcanvas><\u002Fdiv>\n  <div class=\"hero-content fade-in\">\n    <div class=\"hero-eyebrow\" data-en=\"Search Fund — Latin America\" data-es=\"Search Fund — América Latina\">Search Fund — Latin America<\u002Fdiv>\n    <h1 data-en=\"Acquiring <em>exceptional<\u002Fem> businesses in Colombia\" data-es=\"Adquiriendo empresas <em>excepcionales<\u002Fem> en Colombia\">Acquiring <em>exceptional<\u002Fem> businesses in Colombia<\u002Fh1>\n    <p data-en=\"Arista Capital Partners is a search fund focused on identifying, acquiring, and operating premier SMEs across Latin America — building enduring value for investors, operators, and the communities we serve.\" data-es=\"Arista Capital Partners es un search fund enfocado en identificar, adquirir y operar las mejores pymes de América Latina — generando valor duradero para inversores, operadores y las comunidades que servimos.\">Arista Capital Partners is a search fund focused on identifying, acquiring, and operating premier SMEs across Latin America — building enduring value for investors, operators, and the communities we serve.<\u002Fp>\n    <div class=\"hero-actions\">\n      <a href=\"#investors\" class=\"btn-primary\" data-en=\"Investor Information\" data-es=\"Información para Inversores\">Investor Information<\u002Fa>\n      <a href=\"#about\" class=\"btn-outline\" data-en=\"Our Thesis\" data-es=\"Nuestra Tesis\">Our Thesis<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"about\">\n  <div class=\"about-text fade-in\">\n    <div class=\"section-eyebrow\" data-en=\"Our Thesis\" data-es=\"Nuestra Tesis\" style=\"color: rgb(91, 143, 168)\">Our Thesis<\u002Fdiv>\n    <h2 class=\"section-title\" data-en=\"A disciplined approach to acquiring Colombia's finest operators\" data-es=\"Un enfoque disciplinado para adquirir los mejores operadores de Colombia\">A disciplined approach to acquiring Colombia's finest operators<\u002Fh2>\n    <p data-en=\"Latin America represents one of the most compelling untapped markets for the search fund model. Colombia's growing middle class, improving institutional environment, and fragmented SME landscape create a unique window of opportunity for experienced operators.\" data-es=\"América Latina representa uno de los mercados más atractivos y sin explotar para el modelo de search fund. La creciente clase media de Colombia, la mejora del entorno institucional y el fragmentado ecosistema de pymes crean una ventana única de oportunidad para operadores experimentados.\">Latin America represents one of the most compelling untapped markets for the search fund model. Colombia's growing middle class, improving institutional environment, and fragmented SME landscape create a unique window of opportunity for experienced operators.<\u002Fp>\n    <p data-en=\"We focus on profitable, established businesses with defensible competitive positions — where skilled ownership can unlock meaningful value creation over a 5–7 year horizon.\" data-es=\"Nos enfocamos en empresas rentables y consolidadas con posiciones competitivas defendibles — donde una gestión experta puede desbloquear una creación de valor significativa en un horizonte de 5 a 7 años.\">We focus on profitable, established businesses with defensible competitive positions — where skilled ownership can unlock meaningful value creation over a 5–7 year horizon.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"about-pillars fade-in\">\n    <div class=\"pillar\">\n      <span class=\"pillar-num\" style=\"font-size: 28px\">01<\u002Fspan>\n      <div>\n        <div class=\"pillar-title\" data-en=\"US PE is overcrowded &amp; returns are shrinking\" data-es=\"El PE estadounidense está saturado y los retornos se contraen\">US PE is overcrowded &amp; returns are shrinking<\u002Fdiv>\n        <div class=\"pillar-desc\" data-en=\"Too much capital is chasing a limited number of high-quality businesses. The saturated PE landscape has pushed entry multiples to historic highs. The best companies have already been PE-owned and optimized. More deals are now sponsor-to-sponsor, with limited upside left. US PE returns have declined to 5.8% (2022-2025) versus 11.6% for the S&amp;P 500.\" data-es=\"Demasiado capital persigue un número limitado de negocios de alta calidad. El panorama saturado del PE ha llevado los múltiplos de entrada a máximos históricos. Las mejores empresas ya han sido propiedad de PE y optimizadas. Más transacciones son ahora sponsor-a-sponsor, con poco potencial de mejora. Los retornos del PE estadounidense han caído a 5.8% (2022-2025) versus 11.6% del S&amp;P 500.\">Too much capital is chasing a limited number of high-quality businesses. The saturated PE landscape has pushed entry multiples to historic highs. The best companies have already been PE-owned and optimized. More deals are now sponsor-to-sponsor, with limited upside left. US PE returns have declined to 5.8% (2022-2025) versus 11.6% for the S&amp;P 500.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pillar\">\n      <span class=\"pillar-num\" style=\"font-size: 28px\">02<\u002Fspan>\n      <div>\n        <div class=\"pillar-title\" data-en=\"Colombian SMEs remain largely untapped\" data-es=\"Las PYMEs colombianas permanecen en gran medida sin explotar\">Colombian SMEs remain largely untapped<\u002Fdiv>\n        <div class=\"pillar-desc\" data-en=\"Large opportunities remain to professionalize operations. Industries are highly fragmented, creating attractive roll-up opportunities. Businesses trade at meaningful discounts versus the US: LATAM companies trade at 3-6x EBITDA versus 7-12x EBITDA in the US. There is significant runway to unlock value through operational improvement, consolidation, and professional management practices.\" data-es=\"Grandes oportunidades permanecen para profesionalizar operaciones. Las industrias están altamente fragmentadas, creando atractivas oportunidades de consolidación. Los negocios se cotizan con descuentos significativos versus EE.UU.: Las empresas LATAM se cotizan a 3-6x EBITDA versus 7-12x EBITDA en EE.UU. Hay potencial significativo para desbloquear valor mediante mejora operacional, consolidación y prácticas de gestión profesional.\">Large opportunities remain to professionalize operations. Industries are highly fragmented, creating attractive roll-up opportunities. Businesses trade at meaningful discounts versus the US: LATAM companies trade at 3-6x EBITDA versus 7-12x EBITDA in the US. There is significant runway to unlock value through operational improvement, consolidation, and professional management practices.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pillar\">\n      <span class=\"pillar-num\" style=\"font-size: 28px\">03<\u002Fspan>\n      <div>\n        <div class=\"pillar-title\" data-en=\"Search Funds are the ideal model for Colombia\" data-es=\"Los Search Funds son el modelo ideal para Colombia\">Search Funds are the ideal model for Colombia<\u002Fdiv>\n        <div class=\"pillar-desc\" data-en=\"Colombia is too fragmented for traditional PE to enter efficiently. The LATAM search fund model is already proven: data shows average ~50% IRR for LATAM search funds, with 60+ LATAM search fund acquisitions completed to date. This track record demonstrates that search funds are uniquely positioned to identify, acquire, and operate premier SMEs in emerging markets where traditional PE cannot compete effectively.\" data-es=\"Colombia es demasiado fragmentada para que el PE tradicional entre eficientemente. El modelo de search fund LATAM ya está comprobado: los datos muestran un IRR promedio de ~50% para search funds LATAM, con más de 60 adquisiciones de search fund LATAM completadas hasta la fecha. Este historial demuestra que los search funds están posicionados de manera única para identificar, adquirir y operar PYMEs de primer nivel en mercados emergentes donde el PE tradicional no puede competir efectivamente.\">Colombia is too fragmented for traditional PE to enter efficiently. The LATAM search fund model is already proven: data shows average ~50% IRR for LATAM search funds, with 60+ LATAM search fund acquisitions completed to date. This track record demonstrates that search funds are uniquely positioned to identify, acquire, and operate premier SMEs in emerging markets where traditional PE cannot compete effectively.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"sectors\">\n  <div class=\"sectors-header fade-in\">\n    <div>\n      <div class=\"section-eyebrow\" data-en=\"Target Sectors\" data-es=\"Sectores Objetivo\" style=\"color: rgb(91, 143, 168)\">Target Sectors<\u002Fdiv>\n      <h2 class=\"section-title\" data-en=\"Where we focus our search\" data-es=\"Dónde enfocamos nuestra búsqueda\">Where we focus our search<\u002Fh2>\n    <\u002Fdiv>\n    <p class=\"section-sub\" style=\"max-width:300px;\" data-en=\"Fragmented markets with strong unit economics and a clear path to consolidation.\" data-es=\"Mercados fragmentados con sólida economía unitaria y una clara ruta hacia la consolidación.\">Fragmented markets with strong unit economics and a clear path to consolidation.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"sector-cards fade-in\">\n    <div class=\"sector-card\" style=\"border-color: rgb(91, 143, 168)\">\n      <div class=\"sector-icon\" style=\"border-style: none\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"width: 30px; height: 30px\"><path d=\"M2 22h20L14 8l-4 6-4-5-4 13z\" style=\"fill: rgb(255, 205, 0)\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"sector-name\" data-en=\"Clinical<br>Laboratories\" data-es=\"Laboratorios<br>Clínicos\">Clinical<br>Laboratories<\u002Fdiv>\n      <div class=\"sector-desc\" data-en=\"Diagnostic and testing labs serving healthcare providers and direct patients. Recurring demand, essential services, and strong consolidation opportunities.\" data-es=\"Laboratorios de diagnóstico con demanda recurrente, servicios esenciales y claras oportunidades de consolidación.\">Diagnostic and testing labs serving healthcare providers and direct patients. Recurring demand, essential services, and strong consolidation opportunities.<\u002Fdiv>\n      <span class=\"sector-tag\" data-en=\"Target Sector\" data-es=\"Sector Objetivo\" style=\"border-color: rgb(91, 143, 168); color: rgb(91, 143, 168)\">Target Sector<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"sector-card\" style=\"border-color: rgb(91, 143, 168)\">\n      <div class=\"sector-icon\" style=\"border-style: none\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"width: 30px\"><path d=\"M2 22h20L14 8l-4 6-4-5-4 13z\" style=\"fill: rgb(255, 205, 0)\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"sector-name\" data-en=\"Engineering<br>Services\" data-es=\"Servicios de<br>Ingeniería\">Engineering<br>Services<\u002Fdiv>\n      <div class=\"sector-desc\" data-en=\"Specialized engineering firms providing technical consulting, project management, and design services with stable recurring client relationships.\" data-es=\"Firmas de ingeniería especializadas con relaciones comerciales recurrentes y estables.\">Specialized engineering firms providing technical consulting, project management, and design services with stable recurring client relationships.<\u002Fdiv>\n      <span class=\"sector-tag\" data-en=\"Target Sector\" data-es=\"Sector Objetivo\" style=\"color: rgb(91, 143, 168)\">Target Sector<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"sector-card\" style=\"border-color: rgb(91, 143, 168)\">\n      <div class=\"sector-icon\" style=\"border-style: none\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"height: 30px; width: 300px\"><path d=\"M2 22h20L14 8l-4 6-4-5-4 13z\" style=\"fill: rgb(255, 205, 0)\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"sector-name\" data-en=\"Industrial Linen &amp; Laundry\" data-es=\"Lavandería Industrial\">Industrial Linen &amp; Laundry<\u002Fdiv>\n      <div class=\"sector-desc\" data-en=\"Commercial laundry and linen supply businesses serving hospitality, healthcare, and industrial clients. Predictable revenue, high switching costs, and significant local market fragmentation.\" data-es=\"Empresas de lavandería y suministro de lencejía para clientes de hostelería, salud e industria. Ingresos predecibles, altos costos de cambio y notable fragmentación del mercado local.\">Commercial laundry and linen supply businesses serving hospitality, healthcare, and industrial clients. Predictable revenue, high switching costs, and significant local market fragmentation.<\u002Fdiv>\n      <span class=\"sector-tag\" data-en=\"Target Sector\" data-es=\"Sector Objetivo\" style=\"color: rgb(91, 143, 168); border-color: rgb(91, 143, 168)\">Target Sector<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"sector-card\" style=\"border-color: rgb(91, 143, 168)\">\n      <div class=\"sector-icon\" style=\"border-style: none\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"fill: rgb(255, 205, 0); width: 30px; height: 30px\"><path d=\"M2 22h20L14 8l-4 6-4-5-4 13z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"sector-name\" data-en=\"Heavy Equipment<br>Rentals\" data-es=\"Alquiler de<br>Maquinaria Pesada\">Heavy Equipment<br>Rentals<\u002Fdiv>\n      <div class=\"sector-desc\" data-en=\"Equipment rental companies serving construction, mining, and infrastructure with strong recurring revenue and meaningful barriers to entry.\" data-es=\"Empresas de alquiler de equipos con ingresos recurrentes sólidos y barreras de entrada significativas.\">Equipment rental companies serving construction, mining, and infrastructure with strong recurring revenue and meaningful barriers to entry.<\u002Fdiv>\n      <span class=\"sector-tag\" data-en=\"Target Sector\" data-es=\"Sector Objetivo\" style=\"color: rgb(255, 205, 0); border-color: rgb(91, 143, 168)\">Target Sector<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"sector-card\" style=\"border-color: rgb(91, 143, 168)\">\n      <div class=\"sector-icon\" style=\"border-style: none\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"height: 30px\"><path d=\"M2 22h20L14 8l-4 6-4-5-4 13z\" style=\"fill: rgb(255, 205, 0)\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"sector-name\" data-en=\"Specialty Medical<br>Practices\" data-es=\"Consultorios Médicos<br>Especializados\">Specialty Medical<br>Practices<\u002Fdiv>\n      <div class=\"sector-desc\" data-en=\"Focused specialty medical clinics with defensible patient bases, recurring revenue, and professional management upside with strong local market positions.\" data-es=\"Clínicas médicas especializadas con bases de pacientes defendibles e ingresos recurrentes con posiciones sólidas en el mercado local.\">Focused specialty medical clinics with defensible patient bases, recurring revenue, and professional management upside with strong local market positions.<\u002Fdiv>\n      <span class=\"sector-tag\" data-en=\"Target Sector\" data-es=\"Sector Objetivo\" style=\"color: rgb(91, 143, 168)\">Target Sector<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"sector-card\" style=\"border-color: rgb(91, 143, 168)\">\n      <div class=\"sector-icon\" style=\"border-style: none\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"width: 30px\"><path d=\"M2 22h20L14 8l-4 6-4-5-4 13z\" style=\"fill: rgb(255, 205, 0)\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"sector-name\" data-en=\"Specialty Chemicals &amp; Pharma Manufacturing\" data-es=\"Química Especializada y Farmacéutica\">Specialty Chemicals &amp; Pharma Manufacturing<\u002Fdiv>\n      <div class=\"sector-desc\" data-en=\"Niche chemical and pharmaceutical manufacturers with proprietary formulations, regulatory moats, and established customer relationships in industrial and healthcare end markets.\" data-es=\"Fabricantes de nicho en química y farmacéutica con formulaciones propias, barreras regulatorias y relaciones consolidadas con clientes en mercados industriales y sanitarios.\">Niche chemical and pharmaceutical manufacturers with proprietary formulations, regulatory moats, and established customer relationships in industrial and healthcare end markets.<\u002Fdiv>\n      <span class=\"sector-tag\" data-en=\"Target Sector\" data-es=\"Sector Objetivo\" style=\"color: rgb(91, 143, 168)\">Target Sector<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"investors\">\n  <div class=\"fade-in\">\n    <div class=\"section-eyebrow\" style=\"color: rgb(206, 17, 38)\">\n      <span data-en=\"For Investors\" data-es=\"Para Inversores\" style=\"color: rgb(91, 143, 168)\">For Investors<\u002Fspan>\n    <\u002Fdiv>\n    <h2 class=\"section-title\" data-en=\"A differentiated return profile in an emerging market\" data-es=\"Un perfil de retorno diferenciado en un mercado emergente\">A differentiated return profile in an emerging market<\u002Fh2>\n    <p class=\"section-sub\" data-en=\"The search fund model has generated compelling returns for investors over three decades. Arista Capital Partners applies this proven structure to the Latin American opportunity.\" data-es=\"El modelo de search fund ha generado retornos atractivos para inversores durante tres décadas. Arista Capital Partners aplica esta estructura probada a la oportunidad latinoamericana.\">The search fund model has generated compelling returns for investors over three decades. Arista Capital Partners applies this proven structure to the Latin American opportunity.<\u002Fp>\n    <div class=\"invest-points\">\n      <div class=\"invest-point\">\n        <div class=\"invest-check\" style=\"border-color: rgb(206, 17, 38)\">✓<\u002Fdiv>\n        <div class=\"invest-point-text\">\n          <strong data-en=\"Asymmetric upside\" data-es=\"Potencial asimétrico\">Asymmetric upside<\u002Fstrong>\n          <span data-en=\"Step-up economics on acquisition provide early investors preferential returns prior to equity participation by the operators.\" data-es=\"La estructura escalonada en la adquisición otorga a los inversores tempranos retornos preferenciales antes de la participación accionaria de los operadores.\">Step-up economics on acquisition provide early investors preferential returns prior to equity participation by the operators.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"invest-point\">\n        <div class=\"invest-check\" style=\"border-color: rgb(206, 17, 38)\">✓<\u002Fdiv>\n        <div class=\"invest-point-text\">\n          <strong data-en=\"Operator-led model\" data-es=\"Modelo liderado por operadores\">Operator-led model<\u002Fstrong>\n          <span data-en=\"Principals invest meaningfully alongside investors — full alignment of incentives throughout the search and ownership phases.\" data-es=\"Los socios invierten de forma significativa junto a los inversores — alineación total de incentivos durante las fases de búsqueda y propiedad.\">Principals invest meaningfully alongside investors — full alignment of incentives throughout the search and ownership phases.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"invest-point\">\n        <div class=\"invest-check\" style=\"border-color: rgb(206, 17, 38)\">✓<\u002Fdiv>\n        <div class=\"invest-point-text\">\n          <strong data-en=\"Experienced principals\" data-es=\"Socios con experiencia\">Experienced principals<\u002Fstrong>\n          <span data-en=\"Operators bring world-class management consulting and M&amp;A backgrounds — rigorous frameworks applied to SME acquisition.\" data-es=\"Los operadores aportan trayectorias de consultoría de gestión y M&amp;A de primer nivel — marcos rigurosos aplicados a la adquisición de pymes.\">Operators bring world-class management consulting and M&amp;A backgrounds — rigorous frameworks applied to SME acquisition.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"invest-point\">\n        <div class=\"invest-check\">✓<\u002Fdiv>\n        <div class=\"invest-point-text\">\n          <strong data-en=\"Underpenetrated market\" data-es=\"Mercado sin explotar\">Underpenetrated market<\u002Fstrong>\n          <span data-en=\"Latin American search funds remain nascent, creating deal pricing and structural advantages not available in more competitive markets.\" data-es=\"Los search funds en América Latina siguen siendo incipientes, lo que genera ventajas de precio y estructurales no disponibles en mercados más competitivos.\">Latin American search funds remain nascent, creating deal pricing and structural advantages not available in more competitive markets.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"team\">\n  <div class=\"team-header fade-in\">\n    <div class=\"section-eyebrow\" style=\"justify-content: center; color: rgb(91, 143, 168)\" data-en=\"The Team\" data-es=\"El Equipo\">The Team<\u002Fdiv>\n    <h2 class=\"section-title\" data-en=\"Operators first\" data-es=\"Operadores ante todo\">Operators first<\u002Fh2>\n    <p class=\"section-sub\" style=\"margin:0 auto;\" data-en=\"Two principals combining global consulting credentials with deep on-the-ground expertise in Latin America.\" data-es=\"Dos socios que combinan credenciales de consultoría global con un profundo conocimiento sobre el terreno en América Latina.\">Two principals combining global consulting credentials with deep on-the-ground expertise in Latin America.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"team-grid fade-in\">\n    <div class=\"team-card\">\n      <div class=\"team-avatar\">L<\u002Fdiv>\n      <div class=\"team-name\">Louis Abrassard<\u002Fdiv>\n      <div class=\"team-role\" data-en=\"Co-Founder &amp; Principal\" data-es=\"Co-Fundador y Director\" style=\"color: rgb(255, 205, 0)\">Co-Founder &amp; Principal<\u002Fdiv>\n      <div class=\"team-bio\" data-en=\"Consultant at Bain &amp; Company with M&amp;A and strategy experience across multiple sectors. A Yale graduate who has completed 50+ due diligences, Louis brings deep diligence experience across both the buy side and sell side. Brings rigorous analytical frameworks and transaction structuring expertise to the search. Based in Boston, with deep ties to Latin American markets.\" data-es=\"Consultor en Bain &amp; Company con experiencia en M&amp;A y estrategia en múltiples sectores. Graduado de Yale y con más de 50 due diligences completados, Louis aporta una profunda experiencia en procesos de análisis tanto en el lado comprador como vendedor.\">Consultant at Bain &amp; Company with M&amp;A and strategy experience across multiple sectors. A Yale graduate who has completed 50+ due diligences, Louis brings deep diligence experience across both the buy side and sell side. Brings rigorous analytical frameworks and transaction structuring expertise to the search. Based in Boston, with deep ties to Latin American markets.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"team-card\">\n      <div class=\"team-avatar\">M<\u002Fdiv>\n      <div class=\"team-name\">Mateo Morales<\u002Fdiv>\n      <div class=\"team-role\" data-en=\"Co-Founder &amp; Principal\" data-es=\"Co-Fundador y Director\" style=\"color: rgb(255, 205, 0)\">Co-Founder &amp; Principal<\u002Fdiv>\n      <div class=\"team-bio\" data-en=\"A native Colombian, Mateo brings an extensive network of bankers, advisors, and intermediaries in the region. Provides critical on-the-ground deal sourcing networks, regulatory fluency, and management expertise across the target sectors, with deep operational experience in the Colombian market.\" data-es=\"Colombiano de nacimiento, Mateo aporta una extensa red de banqueros, asesores e intermediarios en la región. Ofrece redes críticas de originación de operaciones sobre el terreno, dominio regulatorio y experiencia en gestión en los sectores objetivo.\">A native Colombian, Mateo brings an extensive network of bankers, advisors, and intermediaries in the region. Provides critical on-the-ground deal sourcing networks, regulatory fluency, and management expertise across the target sectors, with deep operational experience in the Colombian market.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"contact\">\n  <div class=\"contact-info fade-in\">\n    <div class=\"section-eyebrow\" data-en=\"Contact\" data-es=\"Contacto\">Contact<\u002Fdiv>\n    <h2 class=\"section-title\" data-en=\"Let's start a conversation\" data-es=\"Iniciemos una conversación\">Let's start a conversation<\u002Fh2>\n    <p class=\"section-sub\" data-en=\"Whether you're a potential investor, a business owner considering your next chapter, or an advisor — we'd like to hear from you.\" data-es=\"Ya sea que sea un potencial inversor, un empresario considerando su próximo capítulo o un asesor — nos gustaría escucharle.\">Whether you're a potential investor, a business owner considering your next chapter, or an advisor — we'd like to hear from you.<\u002Fp>\n    <div class=\"contact-detail\">\n      <div class=\"contact-detail-label\" data-en=\"Headquarters\" data-es=\"Sede\">Headquarters<\u002Fdiv>\n      <div class=\"contact-detail-value\">Boston, MA &amp; Bogotá, Colombia<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"contact-detail\">\n      <div class=\"contact-detail-label\" data-en=\"For Investors\" data-es=\"Para Inversores\">For Investors<\u002Fdiv>\n      <div class=\"contact-detail-value\">investors@aristacapitalpartners.com<\u002Fdiv>\n    <\u002Fdiv>\n  interest in Arista Capital Partners...\" data-placeholder-es=\"Cuéntenos sobre su interés en Arista Capital Partners...\" placeholder=\"Tell us about your interest in Arista Capital Partners...\"><\u002Ftextarea>\n    <\u002Fdiv>\n    <button class=\"form-submit\" data-en=\"Send Message\" data-es=\"Enviar Mensaje\">Send Message<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer>\n  <div class=\"footer-logo\">Arista <span>Capital Partners<\u002Fspan><\u002Fdiv>\n  <div class=\"footer-text\">© <span id=\"footer-year\"><\u002Fspan> Arista Capital Partners · Boston, MA &amp; Bogotá, Colombia<\u002Fdiv>\n  <div class=\"footer-text\" data-en=\"Confidential — Not an offer to sell securities\" data-es=\"Confidencial — No constituye una oferta de venta de valores\">Confidential — Not an offer to sell securities<\u002Fdiv>\n<\u002Ffooter>\n\n<!-- Design Direction Tweaks Panel -->\n<div id=\"tweaks-panel\" style=\"display:none;position:fixed;bottom:24px;right:24px;background:white;border:1px solid rgba(43,58,74,0.15);border-radius:12px;padding:20px;box-shadow:0 12px 48px rgba(0,0,0,0.12);font-family:'DM Sans',sans-serif;z-index:999;max-width:280px;cursor:grab;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;\">\n    <div style=\"font-size:13px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#2B3A4A;\">Tweaks<\u002Fdiv>\n    <button id=\"close-tweaks\" style=\"background:none;border:none;font-size:18px;cursor:pointer;color:#6B7E90;padding:0;width:20px;height:20px;\">×<\u002Fbutton>\n  <\u002Fdiv>\n  \n  <div style=\"font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#6B7E90;margin-bottom:12px;\">Design Direction<\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;gap:8px;\">\n    <label style=\"display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;color:#2B3A4A;\">\n      <input type=\"radio\" name=\"design-dir\" value=\"tight\" style=\"cursor:pointer;\"> Tight &amp; Refined\n    <\u002Flabel>\n    <label style=\"display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;color:#2B3A4A;\">\n      <input type=\"radio\" name=\"design-dir\" value=\"spacious\" checked=\"\" style=\"cursor:pointer;\"> Spacious &amp; Breathing\n    <\u002Flabel>\n    <label style=\"display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;color:#2B3A4A;\">\n      <input type=\"radio\" name=\"design-dir\" value=\"bold\" style=\"cursor:pointer;\"> Bold &amp; Contemporary\n    <\u002Flabel>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // Track design direction preference\n  var designDirection = /*EDITMODE-BEGIN*/{\n    \"direction\": \"spacious\"\n  }/*EDITMODE-END*/;\n  \n  function applyDesignDirection(dir) {\n    designDirection.direction = dir;\n    var html = document.documentElement;\n    html.classList.remove('direction-tight', 'direction-spacious', 'direction-bold');\n    html.classList.add('direction-' + dir);\n    \n    var mainEl = document.querySelector('body');\n    mainEl.classList.remove('design-direction');\n    mainEl.classList.add('design-direction');\n    mainEl.classList.add(dir);\n    \n    // Persist preference\n    window.parent.postMessage({type: '__edit_mode_set_keys', edits: {direction: dir}}, '*');\n    localStorage.setItem('acp-design-dir', dir);\n  }\n  \n  // Initialize design direction from storage or default\n  var savedDir = localStorage.getItem('acp-design-dir') || 'spacious';\n  applyDesignDirection(savedDir);\n  \n  var observer = new IntersectionObserver(function(entries) {\n    entries.forEach(function(e) {\n      if (e.isIntersecting) {\n        e.target.classList.add('visible');\n        var siblings = e.target.parentElement && e.target.parentElement.querySelectorAll('.fade-in');\n        if (siblings) {\n          var delay = 0;\n          siblings.forEach(function(s) {\n            if (!s.classList.contains('visible')) {\n              s.style.transitionDelay = (delay * 0.12) + 's';\n              delay++;\n            }\n          });\n        }\n      }\n    });\n  }, { threshold: 0.12 });\n  document.querySelectorAll('.fade-in').forEach(function(el) { observer.observe(el); });\n\n  var hamburger = document.querySelector('.nav-hamburger');\n  var navLinks  = document.querySelector('.nav-links');\n  hamburger.addEventListener('click', function() {\n    var isOpen = navLinks.classList.toggle('open');\n    hamburger.classList.toggle('open');\n    hamburger.setAttribute('aria-expanded', isOpen);\n  });\n  navLinks.querySelectorAll('a').forEach(function(link) {\n    link.addEventListener('click', function() {\n      navLinks.classList.remove('open');\n      hamburger.classList.remove('open');\n      hamburger.setAttribute('aria-expanded', 'false');\n    });\n  });\n\n  (function() {\n    var canvas = document.getElementById('hero-canvas');\n    var ctx    = canvas.getContext('2d');\n    var W = 0, H = 0;\n    var R = 91, G = 143, B = 168;\n    var NUM_LINES = 22;\n    var STEPS     = 120;\n\n    var phases  = [], speeds  = [], phases2 = [], speeds2 = [];\n    var freqA   = [], freqB   = [], ampA    = [], ampB    = [];\n    for (var qi = 0; qi < NUM_LINES; qi++) {\n      phases.push(Math.random() * Math.PI * 2);\n      speeds.push(0.00090 + Math.random() * 0.00060);\n      phases2.push(Math.random() * Math.PI * 2);\n      speeds2.push(0.00055 + Math.random() * 0.00040);\n      freqA.push(1.2 + Math.random() * 0.8);\n      freqB.push(2.8 + Math.random() * 1.6);\n      ampA.push(0.55 + Math.random() * 0.25);\n      ampB.push(0.30 + Math.random() * 0.20);\n    }\n\n    var basePositions = null;\n    var lastH = 0;\n\n    function buildSpacing(n, h) {\n      var margin = h * 0.04;\n      var usable = h - margin * 2;\n      var step   = usable / (n - 1);\n      var pos = [];\n      for (var k = 0; k < n; k++) {\n        pos.push(margin + k * step + (Math.random() - 0.5) * step * 0.28);\n      }\n      pos.sort(function(a, b) { return a - b; });\n      return pos;\n    }\n\n    function resize() {\n      var w = window.innerWidth;\n      var h = window.innerHeight;\n      if (w !== W || h !== H) {\n        W = canvas.width  = w;\n        H = canvas.height = h;\n      }\n    }\n\n    function noise(idx, xf, ts) {\n      var t1 = ts * speeds[idx]  + phases[idx];\n      var t2 = ts * speeds2[idx] + phases2[idx];\n      return ampA[idx] * Math.sin(xf * freqA[idx] * Math.PI * 2 + t1)\n           + ampB[idx] * Math.sin(xf * freqB[idx] * Math.PI * 2 - t2);\n    }\n\n    function draw(ts) {\n      if (W === 0 || H === 0) { resize(); requestAnimationFrame(draw); return; }\n      if (H !== lastH) { basePositions = buildSpacing(NUM_LINES, H); lastH = H; }\n\n      var minGap = H / (NUM_LINES + 1) * 0.55;\n      var AMP    = minGap * 1.1;\n      var li, ls, prev, by, t_, alpha, x, y;\n      var stride = STEPS + 1;\n\n      ctx.clearRect(0, 0, W, H);\n\n      var grid = new Float32Array(NUM_LINES * stride);\n      for (li = 0; li < NUM_LINES; li++) {\n        by = basePositions[li];\n        for (ls = 0; ls <= STEPS; ls++) {\n          grid[li * stride + ls] = by + noise(li, ls / STEPS, ts) * AMP;\n        }\n      }\n      for (li = 1; li < NUM_LINES; li++) {\n        for (ls = 0; ls <= STEPS; ls++) {\n          prev = grid[(li - 1) * stride + ls];\n          if (grid[li * stride + ls] < prev + minGap * 0.35) {\n            grid[li * stride + ls] = prev + minGap * 0.35;\n          }\n        }\n      }\n      for (li = 0; li < NUM_LINES; li++) {\n        t_    = li / (NUM_LINES - 1);\n        alpha = 0.12 + 0.16 * Math.pow(Math.sin(t_ * Math.PI), 1.4);\n        ctx.beginPath();\n        for (ls = 0; ls <= STEPS; ls++) {\n          x = (ls / STEPS) * W;\n          y = grid[li * stride + ls];\n          if (ls === 0) { ctx.moveTo(x, y); } else { ctx.lineTo(x, y); }\n        }\n        ctx.strokeStyle = 'rgba(' + R + ',' + G + ',' + B + ',' + alpha.toFixed(3) + ')';\n        ctx.lineWidth   = 0.9;\n        ctx.lineJoin    = 'round';\n        ctx.stroke();\n      }\n      requestAnimationFrame(draw);\n    }\n\n    function start() {\n      resize();\n      requestAnimationFrame(draw);\n    }\n\n    window.addEventListener('resize', function() { resize(); basePositions = null; });\n    if (document.readyState === 'loading') {\n      document.addEventListener('DOMContentLoaded', function() { setTimeout(start, 0); });\n    } else {\n      setTimeout(start, 0);\n    }\n  })();\n\n\n  var LATAM_COUNTRIES = new Set(['AR','BO','BR','CL','CO','CR','CU','DO','EC','GT','HN','MX','NI','PA','PE','PR','PY','SV','UY','VE','GY','SR','BZ']);\n  var currentLang = 'en';\n  function applyLang(lang) {\n    currentLang = lang;\n    document.documentElement.lang = lang === 'es' ? 'es' : 'en';\n    document.querySelectorAll('[data-en]').forEach(function(el) {\n      var val = el.getAttribute('data-' + lang);\n      if (!val) return;\n      if (val.indexOf('<') !== -1) { el.innerHTML = val; } else { el.textContent = val; }\n    });\n    document.querySelectorAll('select option[data-en]').forEach(function(opt) {\n      opt.textContent = opt.getAttribute('data-' + lang) || opt.getAttribute('data-en');\n    });\n    var ta = document.querySelector('.form-textarea[data-placeholder-en]');\n    if (ta) ta.placeholder = ta.getAttribute('data-placeholder-' + lang) || ta.getAttribute('data-placeholder-en');\n    var btn = document.getElementById('lang-toggle');\n    btn.textContent = lang === 'es' ? 'EN' : 'ES';\n    btn.title = lang === 'es' ? 'Switch to English' : 'Cambiar a Español';\n    localStorage.setItem('acp-lang', lang);\n  }\n  function detectAndSetLang() {\n    var saved = localStorage.getItem('acp-lang');\n    if (saved) { applyLang(saved); return; }\n    fetch('https://ipapi.co/json/')\n      .then(function(r) { return r.json(); })\n      .then(function(data) { applyLang(LATAM_COUNTRIES.has((data.country_code||'').toUpperCase()) ? 'es' : 'en'); })\n      .catch(function() { applyLang('en'); });\n  }\n  document.getElementById('lang-toggle').addEventListener('click', function() {\n    applyLang(currentLang === 'en' ? 'es' : 'en');\n  });\n  detectAndSetLang();\n  document.getElementById('footer-year').textContent = new Date().getFullYear();\n\n  // Tweaks Panel Handler\n  var tweaksPanel = document.getElementById('tweaks-panel');\n  var closeBtn = document.getElementById('close-tweaks');\n  var dirRadios = document.querySelectorAll('input[name=\"design-dir\"]');\n  \n  // Listen for edit mode activation\n  window.addEventListener('message', function(e) {\n    if (e.data.type === '__activate_edit_mode') {\n      tweaksPanel.style.display = 'block';\n    } else if (e.data.type === '__deactivate_edit_mode') {\n      tweaksPanel.style.display = 'none';\n    }\n  });\n  \n  // Close button\n  closeBtn.addEventListener('click', function() {\n    tweaksPanel.style.display = 'none';\n    window.parent.postMessage({type: '__edit_mode_dismissed'}, '*');\n  });\n  \n  // Design direction radio buttons\n  dirRadios.forEach(function(radio) {\n    radio.addEventListener('change', function() {\n      if (this.checked) {\n        applyDesignDirection(this.value);\n      }\n    });\n  });\n  \n  // Register tweaks availability\n  window.parent.postMessage({type: '__edit_mode_available'}, '*');\n\n  var FORMSPREE_ENDPOINT = 'https://formspree.io/f/mkoenogq';\n  document.querySelector('.form-submit').addEventListener('click', function() {\n    var btn       = document.querySelector('.form-submit');\n    var firstName = document.querySelector('input[placeholder=\"Ana\"]').value.trim();\n    var lastName  = document.querySelector('input[placeholder=\"García\"]').value.trim();\n    var email     = document.querySelector('input[type=\"email\"]').value.trim();\n    var role      = document.querySelector('.form-select').value;\n    var message   = document.querySelector('.form-textarea').value.trim();\n    if (!firstName || !email || !message) {\n      btn.textContent = 'Please fill in required fields';\n      btn.style.background = '#8B4A4A';\n      setTimeout(function() { btn.textContent = 'Send Message'; btn.style.background = ''; }, 2500);\n      return;\n    }\n    btn.textContent = 'Sending...';\n    btn.disabled = true;\n    fetch(FORMSPREE_ENDPOINT, {\n      method: 'POST',\n      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },\n      body: JSON.stringify({ firstName: firstName, lastName: lastName, email: email, role: role, message: message })\n    }).then(function(res) {\n      if (res.ok) {\n        btn.textContent = 'Message Sent';\n        btn.style.background = '#3D7A6B';\n        document.querySelectorAll('.form-input, .form-select, .form-textarea').forEach(function(el) { el.value = ''; });\n        setTimeout(function() { btn.textContent = 'Send Message'; btn.style.background = ''; btn.disabled = false; }, 3000);\n      } else { throw new Error('Server error'); }\n    }).catch(function() {\n      btn.textContent = 'Something went wrong - try again';\n      btn.style.background = '#8B4A4A';\n      setTimeout(function() { btn.textContent = 'Send Message'; btn.style.background = ''; btn.disabled = false; }, 3000);\n    });\n  });\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
